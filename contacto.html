<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Contacto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body {
    margin:0;
    font-family:'Poppins';
    background:#E8E5DF;
}

/* NAVBAR */
nav {
    background-color: #5B53B6;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    flex-wrap: wrap; /* 🔥 clave */
}

.logo {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo img {
    width: 45px;
}

.logo span {
    font-weight: 600;
    font-size: 1.1em;
}

.nav-links {
    display: flex;
    gap: 15px;
}

.nav-links a {
    color:white;
    text-decoration: none;
    font-size: 0.95em;
}

/* HERO */
.hero {
    background:#8F95CC;
    color:white;
    text-align:center;
    padding:50px 20px;
}

.hero h1 {
    font-size: 1.8rem;
}

/* CONTACTO */
.contact {
    text-align: center;
    padding: 40px 20px;
}

.info-contacto p {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 12px 0;
    font-size: 1.05em;
}

.icono {
    width: 22px;
}

/* BOTÓN */
.btn-whatsapp {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 35px;
    padding: 14px 20px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: 600;
    width: fit-content;
}

/* FOOTER */
footer {
    background:#5B53B6;
    color:white;
    text-align:center;
    padding:20px;
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {

    /* NAVBAR */
    nav {
        flex-direction: column;
        align-items: flex-start;
    }

    .nav-links {
        width: 100%;
        justify-content: space-around;
        margin-top: 10px;
    }

    /* HERO */
    .hero h1 {
        font-size: 1.5rem;
    }

    /* CONTACTO */
    .info-contacto p {
        flex-direction: column; /* icono arriba */
        font-size: 1em;
    }

    .icono {
        width: 26px;
    }

    /* BOTÓN */
    .btn-whatsapp {
        width: 100%; /* botón ancho completo */
        font-size: 1.1rem;
        padding: 16px;
    }

}

</style>
</head>

<body>

<nav>
    <div class="logo">
        <img src="img/logo.jpg" alt="Logo">
        <span>Dulce Compañía</span>
    </div>

    <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="servicios.html">Servicios</a>
        <a href="contacto.html">Contacto</a>
        <a href="sobremi.html">Sobre mí</a>
    </div>
</nav>

<section class="hero">
    <h1>Agenda tu primera conversación</h1>
    <p>Estoy aquí para acompañarte</p>
</section>

<section class="contact">

    <div class="info-contacto">
        <p>
            <img src="img/whatsapp.png" class="icono">
            +56 9 9815 8386
        </p>

        <p>
            <img src="img/email.png" class="icono">
            anai.troncoso@dulcecompañia.com
        </p>
    </div>

    <a href="https://wa.me/56998158386" target="_blank" class="btn-whatsapp">
        Escribir por WhatsApp
    </a>

</section>

<footer>
    © 2026 Dulce Compañía
</footer>

</body>
</html>
